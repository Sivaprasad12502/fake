name: my react workflow

on: [push]

jobs:
  build-node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: test/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: test

      - name: Build Vite app
        run: npm run build
        working-directory: test